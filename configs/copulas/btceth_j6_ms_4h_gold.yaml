dataset_version: ds_v0_btceth_4h_binance_closeutc

inputs:
  returns_path: data/processed/${dataset_version}/returns_pit_ready.csv
  u_series_path: data/processed/${dataset_version}/pits/u_series.csv

seed: 123

# 4h mapping: ~6 bars/day => daily refit=40 days -> 40*6=240 bars
refit_every: 240

# numerical safety
u_clip_eps: 1e-10

stress:
  type: RV
  on_asset: BTC
  # daily window=30 days -> 30*6=180 bars
  window: 180
  stress_q: 0.9
  calm_q: 0.5

tcopula:
  nu_grid: [3, 4, 5, 7, 10, 15, 20, 30, 50]
  nu_bounds: [2.1, 60.0]
  rho_clamp: 1e-6

ms_model:
  K: 2
  ordering_key: rho
  min_state_eff_n: 150
  min_state_eff_n_t: 120
  em:
    init_A: [[0.98, 0.02], [0.02, 0.98]]
    max_iter: 50
    tol: 1e-6

dm_test:
  enabled: true
  nw_lag_rule: "4*(n/100)^(2/9)"

reporting:
  figures: true

out_name: j6_ms2_gold_4h_refit240_mineffT120